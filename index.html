<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壹号娱乐（中国）官网</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <!-- 星星背景 -->
    <div class="stars"></div>

    <div class="page-wrapper">
      <!-- 頂部主區塊 -->
      <div class="top-grid">
        <!-- 主 Hero 橫幅 -->
        <div class="hero-card">
          <div class="hero-text">
            <ul class="hero-list">
              <li>体育投注</li>
              <li>电子游戏</li>
              <li>真人视讯</li>
              <li>彩票棋牌</li>
            </ul>
            <h1>欧洲杯<span class="icon">⚽</span>官方直营</h1>
            <p class="hero-sub">大额无忧 豪客首选｜单日取款无上限</p>
            <a href="#" class="hero-btn">进入游戏</a>
          </div>
          <div class="hero-img">
            <img
              src="https://placehold.co/420x320/1a1a3e/ffffff?text=KO+Banner"
              alt="Hero Banner"
            />
          </div>
          <div class="hero-logo">
            <img
              src="https://placehold.co/100x60/0a0a2e/4af/text=KO"
              alt="KO Logo"
            />
          </div>
        </div>

        <!-- 右側卡片 -->
        <div class="side-cards">
          <div class="side-card">
            <div class="side-card-logo">
              <img
                src="https://placehold.co/64x64/0d1f44/4af?text=KY"
                alt="開雲體育"
              />
            </div>
            <div class="side-card-info">
              <h3>開雲體育</h3>
              <p>切爾西方贊助 注單容錯結算快</p>
              <span class="link-enter">點擊進入</span>
            </div>
            <div class="side-card-arrow">›</div>
          </div>

          <div class="side-card">
            <div class="side-card-logo">
              <img
                src="https://placehold.co/64x64/0d1f44/f90?text=HTH"
                alt="華體會體育"
              />
            </div>
            <div class="side-card-info">
              <h3>華體會體育</h3>
              <p>皇家馬德里合作 歐洲杯官方平台</p>
              <span class="link-enter">點擊進入</span>
            </div>
            <div class="side-card-arrow">›</div>
          </div>
        </div>
      </div>

      <!-- 九游娛樂橫幅 -->
      <div class="wide-card">
        <div class="wide-card-logo">
          <img
            src="https://placehold.co/100x100/0d1850/aaf?text=Nine+Game"
            alt="九游娛樂"
          />
        </div>
        <div class="wide-card-info">
          <h3>九游娛樂</h3>
          <p>百家樂美女互動 &nbsp;捕魚王在線爆金</p>
          <span class="link-enter">點擊進入</span>
        </div>
        <div class="wide-card-arrow">›</div>
      </div>

      <!-- 底部 APP 下載區塊 -->
      <div class="download-grid">
        <div class="dl-card dl-teal">
          <img
            src="https://placehold.co/48x48/ffffff33/fff?text=APP"
            alt="開雲體育 App"
            class="dl-icon"
          />
          <div class="dl-info">
            <h3>開雲體育APP下載</h3>
            <p class="dl-tag">新人豪禮送不停</p>
            <p class="dl-sub">每天彩金為您保駕護航</p>
          </div>
        </div>

        <div class="dl-card dl-orange">
          <img
            src="https://placehold.co/48x48/ffffff33/fff?text=APP"
            alt="華體會體育 App"
            class="dl-icon"
          />
          <div class="dl-info">
            <h3>華體會體育APP下載</h3>
            <p class="dl-tag">棋牌 電子 捕魚</p>
            <p class="dl-sub">紅包雨大獎賽不停</p>
          </div>
        </div>

        <div class="dl-card dl-purple">
          <img
            src="https://placehold.co/48x48/ffffff33/fff?text=APP"
            alt="九游娛樂 App"
            class="dl-icon"
          />
          <div class="dl-info">
            <h3>九游娛樂APP下載</h3>
            <p class="dl-tag">頂級信譽平台</p>
            <p class="dl-sub">大額無憂 尊享8888元</p>
          </div>
        </div>
      </div>
    </div>
    <!-- /.page-wrapper -->
  </body>
</html>
