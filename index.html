<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壹号娱乐（中国）官网</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <!-- 星星背景 -->
    <div class="stars"></div>

    <div class="page-wrapper">
      <div class="top-grid">
        <!-- 主 Hero 橫幅 -->
        <div class="hero-card">
          <div class="hero-text">
            <ul class="hero-list">
              <li class="hero-tag">体育投注</li>
              <li class="hero-tag">电子游戏</li>
              <li class="hero-tag">真人视讯</li>
              <li class="hero-tag">彩票棋牌</li>
            </ul>
            <div class="hero-info">
              <h1>欧洲杯<span class="icon">⚽</span>官方直营</h1>
              <p class="hero-sub">大额无忧 豪客首选｜单日取款无上限</p>
            </div>
            <a href="#" class="hero-btn cta-style">进入游戏 ▸</a>
          </div>
        </div>

        <!-- 右側卡片 -->
        <div class="side-cards-wrapper">
          <div class="side-card">
            <div class="side-card-logo">
              <img src="./images/kaiyunlogo.png" alt="开云体育logo" />
            </div>
            <div class="side-card-content">
              <div class="side-card-info">
                <h3>开云体育</h3>
                <p>英超官方赞助 注单容错结算快</p>
                <span class="link-enter">点击进入</span>
              </div>
            </div>
            <div class="side-card-arrow">&#8250;</div>
          </div>

          <div class="side-card">
            <div class="side-card-logo">
              <img src="./images/hthlogo.png" alt="华体会" />
            </div>
            <div class="side-card-content">
              <div class="side-card-info">
                <h3>华体会体育</h3>
                <p>皇家马德里合作 欧洲杯官方平台</p>
                <span class="link-enter">点击进入</span>
              </div>
            </div>
            <div class="side-card-arrow">&#8250;</div>
          </div>
        </div>
        <!-- 九游娱乐 -->
        <div class="side-card">
          <div class="side-card-logo">
            <img src="./images/jiuyoulogo.png" alt="九游娱乐" />
          </div>
          <div class="side-card-content">
            <div class="side-card-info">
              <h3>九游娱乐</h3>
              <p>百家乐美女互动 捕鱼王在线爆金</p>
              <span class="link-enter">点击进入</span>
            </div>
          </div>
          <div class="side-card-arrow">&#8250;</div>
        </div>
      </div>

      <div class="download-grid">
        <div class="dl-card dl-teal">
          <div class="dl-info">
            <h3>开云体育APP下载</h3>
            <p class="dl-tag">新人豪礼送不停</p>
            <p class="dl-sub">每天彩金为您保驾护航</p>
          </div>
        </div>

        <div class="dl-card dl-orange">
          <div class="dl-info">
            <h3>华体会体育APP下载</h3>
            <p class="dl-tag">棋牌 电子 捕鱼</p>
            <p class="dl-sub">红包雨大奖赛不停</p>
          </div>
        </div>

        <div class="dl-card dl-purple">
          <div class="dl-info">
            <h3>九游娱乐APP下载</h3>
            <p class="dl-tag">顶级信誉平台</p>
            <p class="dl-sub">大额无忧 尊享8888元</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
